deck_type: pitch
source: "Andy Raskin strategic narrative"
acts:
  - name: shift
    required: true
    desc: "Name a big change in the world. Not your product."
    position: opening
  - name: stakes
    required: true
    desc: "Winners and losers of that shift; who pays the price."
    position: any
  - name: promised_land
    required: true
    desc: "Future state if the audience adopts your view."
    position: middle
  - name: obstacles
    required: false
    desc: "What makes reaching the promised land hard without you."
    position: middle
  - name: features_as_magic
    required: true
    desc: "Your product features framed as the path to the promised land."
    position: middle
  - name: proof
    required: true
    desc: "Customers, data, or traction that validates the claim."
    position: late
  - name: ask
    required: true
    desc: "Explicit call-to-action — what you want the audience to do next."
    position: closing
