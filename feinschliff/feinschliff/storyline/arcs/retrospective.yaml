deck_type: retrospective
source: "After-action review (AAR) framework"
acts:
  - name: what
    required: true
    desc: "What happened: a factual account of events, outcomes, and metrics."
    position: opening
  - name: so_what
    required: true
    desc: "Why it matters: patterns, root causes, and the significance of outcomes."
    position: middle
  - name: now_what
    required: true
    desc: "What to do next: concrete changes to process, behaviour, or priorities."
    position: closing
