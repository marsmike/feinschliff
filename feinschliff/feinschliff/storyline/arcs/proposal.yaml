deck_type: proposal
source: "Barbara Minto — The Pyramid Principle (SCQA)"
acts:
  - name: situation
    required: true
    desc: "Agreed facts about the current state — common ground with the audience."
    position: opening
  - name: complication
    required: true
    desc: "What has changed or gone wrong that disturbs the situation."
    position: opening
  - name: question
    required: true
    desc: "The question the complication raises in the audience's mind."
    position: middle
  - name: answer
    required: true
    desc: "Your top-line answer to the question, stated upfront."
    position: middle
  - name: recommendation
    required: true
    desc: "Specific actions you recommend the audience take, with rationale."
    position: closing
