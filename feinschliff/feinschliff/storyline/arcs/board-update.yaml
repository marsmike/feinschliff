deck_type: board-update
source: "BCG board-update template"
acts:
  - name: kpi_delta
    required: true
    desc: "Key performance indicators vs. plan and prior period, with variance explanation."
    position: opening
  - name: narrative
    required: true
    desc: "The strategic story behind the numbers: what is working and why."
    position: middle
  - name: risks
    required: true
    desc: "Material risks to plan, with likelihood, impact, and mitigations."
    position: late
  - name: asks
    required: true
    desc: "Decisions or approvals the board is asked to make."
    position: closing
