pgmeta: "Architecture"
tracker: "How requests flow"
action_title: "Three sinks behind one API: cache, DB, queue"
diagram_dsl: |
  # Slot is 1720x320 (no virtual upscale). Boxes 200 wide with 140px
  # gaps in the linear chain so arrow labels (HTTPS, TLS term) have
  # room. The fan-out column on the right stacks three sinks behind
  # the api so the diagonals to cache (up) and queue (down) form a
  # Y-divergence around the straight middle hop into db.

  box browser  60,120   200x100 "Browser"             fill:primary
  box edge     400,120  200x100 "Edge proxy"          fill:secondary
  box api      740,120  200x100 "API"                 fill:primary
  box cache    1080,10  220x80  "Cache\n(reads)"      fill:tertiary
  box db       1080,120 220x100 "Database\n(writes)"  fill:ink
  box queue    1080,240 220x80  "Queue\n(async)"      fill:secondary

  # Linear pipe (3 hops, port-anchored, labelled)
  arrow browser:right -> edge:left  label:"HTTPS"
  arrow edge:right    -> api:left   label:"TLS term"

  # Fan-out: api's right edge feeds three sinks. Bare (no ports, no
  # elbow) so the diagonals to cache (up) and queue (down) form the
  # divergence X around the straight middle hop into db.
  # Auto label-placement picks "above midpoint" for both diagonals,
  # which lands the down-going `emit` label on top of the api box.
  # Pin the queue arrow's label to below so it sits between the
  # arrow and queue instead.
  arrow api -> cache label:"read"
  arrow api -> db    label:"write"
  arrow api -> queue label:"emit" labelpos:below
so_what: "Reads serve from cache, writes commit to DB, side-effects fan out to the queue — three sinks, one API surface"
source: "Internal load test, 2026-05"
footer_left: "Feinschliff"
footer_right: "v0.3"
