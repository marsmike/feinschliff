pgmeta: "Architecture"
tracker: "Request lifecycle across the platform"
action_title: "Twelve hops from edge to durable storage."
diagram_dsl: |
  zone z_edge    100,40   3340x800 "Edge / Ingress"          fill:surface
  zone z_core    3500,40  3260x800 "Core services"           fill:surface-2
  zone z_data    100,920  6660x900 "Data plane"              fill:surface-2
  zone z_trust   100,1900 6660x900 "Trust & policy"          fill:surface

  box client     200,180  900x420  "Client\n(web + mobile)"      fill:primary
  box waf        1180,180 900x420  "WAF\n+ rate-limit"           fill:tertiary
  box edge_lb    2160,180 900x420  "Edge LB\n(L7 TLS)"           fill:secondary
  box gateway    3580,180 900x420  "API gateway\n(auth + JWT)"   fill:primary
  box mesh       4560,180 900x420  "Service mesh\n(mTLS)"        fill:secondary
  box ordersvc   5540,180 1100x420 "Order service\n(saga coord)" fill:primary

  box paysvc     200,1060  900x320  "Payment\nservice"           fill:primary
  box fraud      1180,1060 900x320  "Fraud scoring\n(model)"     fill:tertiary
  box invsvc     2160,1060 900x320  "Inventory\nservice"         fill:primary
  box notify     3140,1060 900x320  "Notification\nfan-out"      fill:secondary
  box bus        4120,1060 900x320  "Event bus\n(durable)"       fill:secondary
  box dbprim     5100,1060 800x320  "Primary DB\n(write)"        fill:ink
  box dbread     5980,1060 660x320  "Read\nreplica"              fill:ink

  box kms        200,2040  900x400 "KMS\n(envelope keys)"        fill:warning
  box vault      1180,2040 900x400 "Secrets vault\n(rotation)"   fill:warning
  box iam        2160,2040 900x400 "Identity provider\n(OIDC)"   fill:tertiary
  box policy     3140,2040 900x400 "Policy engine\n(OPA)"        fill:tertiary
  box audit      4120,2040 900x400 "Audit log\n(append-only)"    fill:secondary
  box pii        5100,2040 900x400 "PII tokenizer"               fill:warning
  box dlq        6080,2040 560x400 "DLQ"                         fill:danger

  # Main request flow only — 12 arrows tracing the user's path from edge
  # to durable storage. Cross-zone arrows to the Trust & policy band were
  # removed (was 19 arrows total) because every cross-zone hop produces
  # a long diagonal that crosses other arrows — "arrow hell" by inspection.
  # The trust zone now reads as an implicit context for the flow above;
  # its enforcement points (KMS, vault, IAM, OPA, audit, PII tokenizer,
  # DLQ) are listed as boxes but not wired in.
  arrow client -> waf
  arrow waf -> edge_lb
  arrow edge_lb -> gateway
  arrow gateway -> mesh
  arrow mesh -> ordersvc
  arrow ordersvc -> paysvc
  arrow ordersvc -> invsvc
  arrow paysvc -> bus
  arrow invsvc -> bus
  arrow bus -> notify
  arrow bus -> dbprim
  arrow dbprim -> dbread
so_what: "P95 budget = 80 ms; 32 ms is the policy round-trip — cache decisions per request, refresh out-of-band"
footer_left: "Feinschliff"
footer_right: "v0.3"
