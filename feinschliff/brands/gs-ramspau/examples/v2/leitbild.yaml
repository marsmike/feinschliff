pgmeta:  "Leitbild"
title:   "Vier Werte tragen unsere Schule"
values:
  - num: "01"
    title: "Naturverbunden"
    body: "Wir lernen mit dem, was vor der Tür wächst. Wald, Wiese und Bach sind unser zweites Klassenzimmer."
  - num: "02"
    title: "Gemeinschaftlich"
    body: "Jahrgangsgemischt heißt: Ältere erklären, jüngere fragen. Niemand sitzt allein vor seiner Aufgabe."
  - num: "03"
    title: "Selbstwirksam"
    body: "Kinder dürfen entscheiden, mitgestalten und sich verirren. Daraus entsteht Vertrauen in sich selbst."
  - num: "04"
    title: "Verlässlich"
    body: "Klare Regeln, klare Zeiten, klare Ansprechpersonen. Eltern wissen, woran sie sind."
footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
footer_center: "LEITBILD · STAND 2026"
footer_right:  "SEITE 11 / 14"
