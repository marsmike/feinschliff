<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Feinschliff gem">
  <!-- Crown facets (top) -->
  <polygon fill="#8eb3e2" points="100,28 70,70 100,60"></polygon>
  <polygon fill="#5e8ac4" points="100,28 100,60 130,70"></polygon>
  <polygon fill="#4670ad" points="30,88 70,70 100,60 100,88"></polygon>
  <polygon fill="#2f5590" points="100,60 100,88 170,88 130,70"></polygon>
  <polygon fill="#547fb8" points="100,28 70,70 30,88"></polygon>
  <polygon fill="#1f3f73" points="100,28 130,70 170,88"></polygon>

  <!-- Pavilion facets (bottom) — subdivided at x=70 and x=130 for facet depth -->
  <polygon fill="#355a8b" points="30,88 70,88 100,178"></polygon>
  <polygon fill="#234168" points="70,88 100,88 100,178"></polygon>
  <polygon fill="#16304f" points="100,88 130,88 100,178"></polygon>
  <polygon fill="#0e2447" points="130,88 170,88 100,178"></polygon>

  <!-- Inner facet ridges — hairlines for cut definition -->
  <g fill="none" stroke="#08172e" stroke-width="0.6" stroke-linejoin="miter" stroke-opacity="0.55">
    <line x1="30" y1="88" x2="170" y2="88"></line>
    <line x1="70" y1="70" x2="130" y2="70"></line>
    <line x1="100" y1="28" x2="100" y2="88"></line>
    <line x1="70" y1="70" x2="100" y2="60"></line>
    <line x1="130" y1="70" x2="100" y2="60"></line>
    <line x1="100" y1="88" x2="100" y2="178"></line>
    <line x1="70" y1="88" x2="100" y2="178"></line>
    <line x1="130" y1="88" x2="100" y2="178"></line>
  </g>

  <!-- Outer silhouette — kept crisp for icon legibility -->
  <polygon fill="none" stroke="#08172e" stroke-width="1.2" stroke-linejoin="miter"
           points="100,28 30,88 100,178 170,88"></polygon>
</svg>
