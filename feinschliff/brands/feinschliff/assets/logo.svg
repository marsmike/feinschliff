<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 32" role="img" aria-label="Feinschliff logo">
  <!-- Gem mark: diamond silhouette centred at x=12, y=16 (12×12 bounding box, 3px margin each side) -->
  <!-- The gem is a rotated square (diamond) with points at top/right/bottom/left -->
  <!-- Crown facets -->
  <polygon fill="#2f5590" points="12,4 8,12 12,10 16,12"></polygon>
  <polygon fill="#1f3f73" points="8,12 12,10 12,16"></polygon>
  <polygon fill="#0e2447" points="16,12 12,10 12,16"></polygon>
  <!-- Pavilion facets -->
  <polygon fill="#355a8b" points="4,16 8,16 12,28"></polygon>
  <polygon fill="#234168" points="8,16 12,16 12,28"></polygon>
  <polygon fill="#16304f" points="12,16 16,16 12,28"></polygon>
  <polygon fill="#0e2447" points="16,16 20,16 12,28"></polygon>
  <!-- Belt (girdle) line -->
  <line x1="4" y1="16" x2="20" y2="16" stroke="#08172e" stroke-width="0.4" stroke-opacity="0.55"></line>
  <!-- Crown ridge -->
  <line x1="8" y1="12" x2="16" y2="12" stroke="#08172e" stroke-width="0.4" stroke-opacity="0.55"></line>
  <line x1="12" y1="4" x2="12" y2="16" stroke="#08172e" stroke-width="0.4" stroke-opacity="0.55"></line>
  <!-- Outer silhouette -->
  <polygon fill="none" stroke="#08172e" stroke-width="0.8" stroke-linejoin="miter"
           points="12,4 4,16 12,28 20,16"></polygon>
  <!-- Sparkle -->
  <path fill="#fff3d6" fill-opacity="0.85"
        d="M 17 9 C 17 11.2 18.2 12.4 20.4 12.4 C 18.2 12.4 17 13.6 17 15.8 C 17 13.6 15.8 12.4 13.6 12.4 C 15.8 12.4 17 11.2 17 9 Z"></path>
  <!-- Wordmark: starts at x=28, vertically centred at y=16 -->
  <text x="28" y="16"
        font-family='"Aktiv Grotesk", "Inter", system-ui, sans-serif'
        font-size="18"
        font-weight="500"
        letter-spacing="3"
        fill="#0B1A33"
        text-anchor="start"
        dominant-baseline="middle">FEINSCHLIFF.</text>
</svg>
