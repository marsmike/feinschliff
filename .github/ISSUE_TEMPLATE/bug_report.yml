name: Bug report
description: A plugin doesn't work as advertised
labels: [bug]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - feinschliff
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the command you ran and what you expected.
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "0.x.y"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.x / Ubuntu 24.04 / etc."
    validations:
      required: true
