name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          missing=()
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              missing+=("$sha $(git log -1 --format=%s "$sha")")
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Commits missing Signed-off-by line:"
            printf '  %s\n' "${missing[@]}"
            echo
            echo "Add a sign-off to every commit:"
            echo "  git commit -s -m \"your message\""
            echo "Or amend an existing commit:"
            echo "  git commit --amend --signoff"
            exit 1
          fi
          echo "✓ All commits have DCO sign-off."

  feinschliff:
    # Job display name kept as "feinschliff lib tests" because main's
    # branch protection lists it as a required status check; renaming it
    # would leave PRs Expected — Waiting for status to be reported forever.
    name: feinschliff lib tests
    runs-on: ubuntu-latest
    env:
      # Surface feinschliff-extra brand packs to discover_brands(). Several
      # cross-plugin tests reference brand names that live only in the
      # extra plugin (catppuccin, nord, gruvbox, feinschliff-dark, …) —
      # without this they fail with "brand not found".
      FEINSCHLIFF_BRAND_PATH: ${{ github.workspace }}/feinschliff-extra/brands
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace (all packages + dev groups)
        # Both packages are needed: a few core tests exercise the
        # integrated ship pipeline (build → verify-quality), which calls
        # into feinschliff-builder. Single sync from the workspace root
        # keeps lockfile resolution consistent across jobs.
        run: uv sync --all-packages --all-groups
      - name: Lint (ruff)
        working-directory: feinschliff
        run: uv run ruff check .
      - name: Run tests
        working-directory: feinschliff
        # Skip legacy test_skill_validator: pre-existing failures unrelated to
        # the lib code; re-include once the legacy skills are reformatted.
        # Skip render-dependent tests: CI doesn't install libcairo / playwright,
        # so the render-backend probe in these tests would auto-skip anyway —
        # ignoring at the file/test level is faster and keeps the report focused
        # on structural coverage.
        run: |
          uv run pytest -q \
            --ignore=tests/test_skill_validator.py \
            --ignore=tests/test_layout_excalidraw_diagram.py \
            --ignore=tests/test_layout_svg_infographic.py \
            --ignore=tests/test_diagrams_render.py \
            --ignore=tests/test_excalidraw_render.py \
            --ignore=tests/test_excalidraw_vocabulary_parity.py \
            --deselect tests/test_examples_decks.py::test_deck_builds

  feinschliff-builder:
    name: feinschliff-builder tests
    runs-on: ubuntu-latest
    env:
      FEINSCHLIFF_BRAND_PATH: ${{ github.workspace }}/feinschliff-extra/brands
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace (all packages + dev groups)
        run: uv sync --all-packages --all-groups
      - name: Lint (ruff)
        working-directory: feinschliff-builder
        run: uv run ruff check .
      - name: Run tests
        working-directory: feinschliff-builder
        # Skip render/refurbish/chrome-dependent tests: CI doesn't install
        # libcairo / playwright / chromium, so these auto-skip anyway —
        # explicit ignore is faster and keeps the report focused on
        # structural coverage.
        run: |
          uv run pytest -q \
            --ignore=tests/test_examples_refurbish.py \
            --ignore=tests/test_refurbish_polish_cli.py \
            --ignore=tests/test_render_brand_atlas_cache.py \
            --ignore=tests/test_verify_chrome.py

  feinblick:
    name: feinblick tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # feinblick is a standalone, stdlib-only plugin (not a uv-workspace
      # member), so it manages its own env — no root `uv sync` needed.
      - name: Lint (ruff)
        working-directory: feinblick
        run: uv run --group dev ruff check .
      - name: Run tests
        working-directory: feinblick
        # The integration test stubs the external engines and the network smoke
        # test is @pytest.mark.skip-ed, so the suite needs no uvx/npx/Node.
        run: uv run --group dev pytest -q

