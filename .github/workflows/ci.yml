name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          missing=()
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              missing+=("$sha $(git log -1 --format=%s "$sha")")
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Commits missing Signed-off-by line:"
            printf '  %s\n' "${missing[@]}"
            echo
            echo "Add a sign-off to every commit:"
            echo "  git commit -s -m \"your message\""
            echo "Or amend an existing commit:"
            echo "  git commit --amend --signoff"
            exit 1
          fi
          echo "✓ All commits have DCO sign-off."

  consistency:
    name: generated files + consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Launchers + build-wheels in sync with the generator
        run: python3 scripts/gen_launchers.py --check
      - name: constraints.txt matches the locked closure
        run: |
          set -euo pipefail
          uv export --frozen --no-emit-workspace --no-hashes --no-dev -o /tmp/constraints.txt
          # Compare only the pin lines; the header comment embeds the -o path.
          if ! diff -u <(grep -v '^#' constraints.txt) <(grep -v '^#' /tmp/constraints.txt); then
            echo "::error::constraints.txt is stale — run: uv export --frozen --no-emit-workspace --no-hashes --no-dev -o constraints.txt"
            exit 1
          fi
      - name: All workspace packages share one version
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import tomllib, pathlib, sys
          members = ["feinschmiede", "feinschliff", "feinschliff-builder",
                     "feinbild", "feinklang", "feinschnitt", "feinblick"]
          versions = {m: tomllib.loads(pathlib.Path(m, "pyproject.toml").read_text())["project"]["version"]
                      for m in members}
          uniq = set(versions.values())
          if len(uniq) != 1:
              print("::error::Python package versions disagree:", versions)
              sys.exit(1)
          print("✓ all packages at", uniq.pop())
          PY
      - name: Skill docs use bare CLIs (no `uv run <cli>`, no `lib.` engine paths)
        run: |
          set -euo pipefail
          if grep -rn --include='*.md' -E 'uv run (feinschliff|feinschliff-builder|feinbild|feinklang|feinschnitt|feinblick)\b' */skills/; then
            echo "::error::skills/ must call the bare CLI on PATH, not 'uv run <cli>'"
            exit 1
          fi
          if grep -rn --include='*.md' -E 'python -m lib\.|feinschliff/lib/' */skills/; then
            echo "::error::skills/ reference the retired lib.* engine path (now feinschmiede / feinbild)"
            exit 1
          fi
          echo "✓ skill docs clean"

  feinschliff:
    # Job display name kept as "feinschliff lib tests" because main's
    # branch protection lists it as a required status check; renaming it
    # would leave PRs Expected — Waiting for status to be reported forever.
    name: feinschliff lib tests
    runs-on: ubuntu-latest
    env:
      # Surface feinschliff-extra brand packs to discover_brands(). Several
      # cross-plugin tests reference brand names that live only in the
      # extra plugin (catppuccin, nord, gruvbox, feinschliff-dark, …) —
      # without this they fail with "brand not found".
      FEINSCHLIFF_BRAND_PATH: ${{ github.workspace }}/feinschliff-extra/brands
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace (all packages + dev groups)
        # Both packages are needed: a few core tests exercise the
        # integrated ship pipeline (build → verify-quality), which calls
        # into feinschliff-builder. Single sync from the workspace root
        # keeps lockfile resolution consistent across jobs.
        run: uv sync --all-packages --all-groups
      - name: Lint (ruff)
        working-directory: feinschliff
        run: uv run ruff check .
      - name: Run tests
        working-directory: feinschliff
        # Skip legacy test_skill_validator: pre-existing failures unrelated to
        # the lib code; re-include once the legacy skills are reformatted.
        # Skip render-dependent tests: CI doesn't install libcairo / playwright,
        # so the render-backend probe in these tests would auto-skip anyway —
        # ignoring at the file/test level is faster and keeps the report focused
        # on structural coverage. (The rough+cairosvg render path is covered by
        # the feinbild leg of the `packages` matrix, which installs libcairo2.)
        run: |
          uv run pytest -q \
            --ignore=tests/test_skill_validator.py \
            --ignore=tests/test_layout_excalidraw_diagram.py \
            --ignore=tests/test_layout_svg_infographic.py \
            --ignore=tests/test_diagrams_render.py \
            --ignore=tests/test_excalidraw_render.py \
            --ignore=tests/test_excalidraw_vocabulary_parity.py \
            --deselect tests/test_examples_decks.py::test_deck_builds

  feinschliff-builder:
    name: feinschliff-builder tests
    runs-on: ubuntu-latest
    env:
      FEINSCHLIFF_BRAND_PATH: ${{ github.workspace }}/feinschliff-extra/brands
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace (all packages + dev groups)
        run: uv sync --all-packages --all-groups
      - name: Lint (ruff)
        working-directory: feinschliff-builder
        run: uv run ruff check .
      - name: Run tests
        working-directory: feinschliff-builder
        # Only the Playwright/Chromium refurbish tests stay ignored (no browser
        # in CI). The chrome-scanner and atlas-cache tests are backend-free
        # (python-pptx/lxml + filesystem) and run here.
        run: |
          uv run pytest -q \
            --ignore=tests/test_examples_refurbish.py \
            --ignore=tests/test_refurbish_polish_cli.py

  packages:
    name: ${{ matrix.pkg }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [feinschmiede, feinbild, feinklang, feinschnitt]
    env:
      FEINSCHLIFF_BRAND_PATH: ${{ github.workspace }}/feinschliff-extra/brands
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install libcairo2 (rough+cairosvg production render path)
        run: sudo apt-get update && sudo apt-get install -y libcairo2
      - name: Install workspace (all packages + dev groups)
        run: uv sync --all-packages --all-groups
      - name: Lint (ruff)
        working-directory: ${{ matrix.pkg }}
        run: uv run ruff check .
      - name: Run tests
        working-directory: ${{ matrix.pkg }}
        run: uv run pytest -q

  feinblick:
    name: feinblick tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Lint (ruff)
        working-directory: feinblick
        run: uv run --group dev ruff check .
      - name: Run tests
        working-directory: feinblick
        # The integration test stubs the external engines and the network smoke
        # test is @pytest.mark.skip-ed, so the suite needs no uvx/npx/Node.
        run: uv run --group dev pytest -q

  wheel-install:
    name: ${{ matrix.plugin }} wheel install + CLI smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: [feinschliff, feinbild, feinklang, feinschnitt, feinschliff-builder, feinblick]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build the bundled wheelhouse from source
        working-directory: ${{ matrix.plugin }}
        run: bash build-wheels.sh
      - name: Bootstrap the launcher venv (offline) and smoke-run the CLI
        # The same path a fresh marketplace install takes: the bin/ launcher
        # provisions a clean venv from the wheelhouse (no index) and execs the
        # CLI. Proves the wheel installs, package data ships, and the CLI starts
        # — the sole distribution path, previously ungated.
        working-directory: ${{ matrix.plugin }}
        run: |
          set -euo pipefail
          export CLAUDE_PLUGIN_ROOT="$PWD"
          export CLAUDE_PLUGIN_DATA="$RUNNER_TEMP/${{ matrix.plugin }}-data"
          ./bin/${{ matrix.plugin }} --help >/dev/null
          echo "✓ ${{ matrix.plugin }} installed from wheelhouse and CLI started"
