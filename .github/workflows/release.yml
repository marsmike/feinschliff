name: Release (rolling latest)

# Triggered on every push to main (and manually). Deletes + recreates the
# `latest` tag + release at HEAD, then builds per-Python wheel tarballs for
# every CLI plugin and uploads them (--clobber replaces stale assets).
# No semver. `git push origin main` is the only release trigger needed.
on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prep-release:
    name: Reset latest release at HEAD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Re-tag and re-create latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # Delete any existing latest release + tag, then recreate at this commit.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --target "$GITHUB_SHA" \
            --title "latest" \
            --notes "Rolling build from main @ $GITHUB_SHA" \
            --latest

  marketplace-zip:
    name: Build + upload marketplace zip
    needs: prep-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build marketplace zip
        run: |
          set -e
          prefix="feinschmiede"
          zip="${prefix}.zip"
          git archive --format=zip --prefix="${prefix}/" -o "$zip" HEAD
          if ! unzip -l "$zip" | grep -q "${prefix}/.claude-plugin/marketplace.json"; then
            echo "::error::marketplace.json missing from zip root" >&2
            exit 1
          fi
          ls -lh "$zip"
      - name: Upload to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload latest feinschmiede.zip --clobber

  wheels:
    name: Build ${{ matrix.plugin }} wheels (py${{ matrix.python-version }})
    needs: prep-release
    strategy:
      fail-fast: false
      matrix:
        plugin: [feinschliff, feinschliff-builder, feinbild, feinklang, feinschnitt]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Build wheelhouse
        working-directory: ${{ matrix.plugin }}
        run: bash build-wheels.sh
      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          plugin='${{ matrix.plugin }}'
          pyver='${{ matrix.python-version }}'
          pykey="py${pyver/./}"   # 3.11 → py311
          tarball="${plugin}-wheels-${pykey}.tar.gz"
          tar czf "$tarball" -C "${plugin}/wheels" .
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          ls -lh "$tarball"
      - name: Upload tarball to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload latest '${{ steps.pack.outputs.tarball }}' --clobber
