name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace (all packages)
        # The gallery script lives in feinschliff-builder/scripts/ post-split
        # and reads brand packs from both feinschliff/ and feinschliff-extra/,
        # so install the whole workspace.
        run: uv sync --all-packages
      - name: Build brand-gallery site
        working-directory: feinschliff-builder
        run: uv run python scripts/build_brand_gallery_site.py
      - name: Add root redirect to /brands/
        run: |
          cat > docs/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>feinschmiede brand gallery</title>
          <meta http-equiv="refresh" content="0; url=brands/">
          <link rel="canonical" href="brands/">
          <p>Redirecting to the <a href="brands/">feinschmiede brand gallery</a>…</p>
          HTML
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
