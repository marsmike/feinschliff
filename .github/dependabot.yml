# Dependabot keeps Python deps + GitHub Actions current.
# Grouped weekly updates to avoid PR noise; security alerts fire on their own.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/feinschliff"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
