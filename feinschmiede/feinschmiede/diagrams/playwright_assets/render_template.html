<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>excalidraw → svg renderer</title>
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; }
    body { overflow: visible; }
    main#stage { display: inline-block; }
    main#stage > svg { display: block; }
  </style>
</head>
<body data-state="loading">
  <main id="stage"></main>

  <script type="module">
    import * as excalidraw from "https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle";

    const stage = document.getElementById("stage");
    const setState = (next) => { document.body.dataset.state = next; };

    /**
     * Render an Excalidraw scene payload to an inline <svg> attached to
     * #stage. The Playwright side polls document.body.dataset.state for
     * the "ready" / "rendered" / "error" transitions and screenshots
     * #stage > svg once the rendered state is reached.
     */
    window.renderToSvg = async (payload) => {
      try {
        const scene = typeof payload === "string" ? JSON.parse(payload) : payload;
        const elements = scene.elements ?? [];
        const filesMap = scene.files ?? {};
        const incomingAppState = scene.appState ?? {};

        // Always export with a white background and never in dark mode —
        // the deck pipeline post-processes the PNG and assumes opaque
        // white where the diagram itself doesn't paint.
        const appState = {
          ...incomingAppState,
          viewBackgroundColor: incomingAppState.viewBackgroundColor ?? "#ffffff",
          exportBackground: true,
          exportWithDarkMode: false,
        };

        const svgNode = await excalidraw.exportToSvg({
          elements,
          appState,
          files: filesMap,
        });

        stage.replaceChildren(svgNode);
        setState("rendered");
        return {
          ok: true,
          width: svgNode.getAttribute("width"),
          height: svgNode.getAttribute("height"),
        };
      } catch (err) {
        const message = String(err?.message ?? err);
        document.body.dataset.error = message;
        setState("error");
        return { ok: false, error: message };
      }
    };

    setState("ready");
  </script>
</body>
</html>
