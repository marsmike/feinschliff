# Note: feinschliff-extra is a pure-data plugin (no Python, no pyproject.toml)
# and is intentionally NOT a workspace member. It ships brand-pack assets only.
[tool.uv.workspace]
members = [
    "feinschmiede",
    "feinschliff",
    "feinschliff-builder",
    "feinbild",
    "feinklang",
    "feinschnitt",
]

[tool.ruff.lint.per-file-ignores]
# Tests moved to repo-root tests/<plugin>/ — suppress the same lint rules that
# each plugin's pyproject.toml suppresses for their own tests/** path.
"tests/**" = ["E402"]
