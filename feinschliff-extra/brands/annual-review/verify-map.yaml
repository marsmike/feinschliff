# Annual Review — verify map
#
# Maps each brand layout to its 1-based slide number in the source deck
# (feinschliff-extra/assets/templates/AnnualReview.pptx, 13 slides). Consumed by:
#   - scripts/brand_decompile_all.py  (decompile slide N -> layouts/<name>.slide.dsl)
#   - scripts/brand_verify_loop.py    (render + visual-diff each layout vs slide N)
#
# chart_bboxes (added after the first verify render) mask chart/diagram regions
# that the picture-slot extractor doesn't cover, so struct_diff_ratio measures
# layout chrome rather than rasterised chart noise. bbox = [x, y, w, h] in
# 1920x1080 design space.

layouts:
  cover: 1
  agenda: 2
  introduction: 3
  last-year: 4
  growth-chart: 5
  growth-table: 6
  quote: 7
  team: 8
  timeline: 9
  goals-q1: 10
  goals-q2: 11
  summary: 12
  thank-you: 13
