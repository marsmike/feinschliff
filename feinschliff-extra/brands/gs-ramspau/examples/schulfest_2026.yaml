# Reference deck — Schulfest am 15. Mai 2026 (v2 DSL plan).
#
# Builds a 14-slide deck that exercises every gs-ramspau layout in
# sequence. Build with:
#
#     feinschliff deck build brands/gs-ramspau/examples/schulfest_2026.yaml \
#       -o brands/gs-ramspau/examples/out/schulfest-2026.pptx
#
# Toolkit-shared layouts (title-orange, chapter-ink, agenda, three-column,
# text-picture, quote, end) inherit gs-ramspau tokens via the brand's
# DESIGN.md `extends: feinschliff` chain. Brand-specific layouts pull
# their fixtures from `examples/v2/`.

brand: gs-ramspau
out:   brands/gs-ramspau/examples/out/schulfest-2026.pptx

slides:
  # 01 — opener
  - layout: layouts/title-orange.slide.dsl
    content:
      pgmeta:        "Schulfest · 15. Mai 2026"
      eyebrow:       "WILLKOMMEN"
      title:         "Schulfest\nam 15. Mai"
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_center: "STAND · 12.05.2026"
      footer_right:  "SEITE 1 / 14"

  # 02 — full-bleed cover (canonical title+picture stand-in)
  - layout: layouts/full-bleed-cover.slide.dsl
    content:
      pgmeta:        "Cover"
      image:         ""
      eyebrow:       "Fest am Schulhaus"
      title:         "Ein Tag\nfür alle."
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 2 / 14"

  # 03 — section break
  - layout: layouts/chapter-ink.slide.dsl
    content:
      pgmeta:        "Programm"
      eyebrow:       "PROGRAMM"
      chapter_number: "01"
      chapter_title: "Was wir\nvorhaben."
      image:         ""
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 3 / 14"

  # 04 — agenda (Programmpunkte)
  - layout: layouts/agenda.slide.dsl
    content:
      pgmeta:        "Programm"
      eyebrow:       "AGENDA · 14 – 18 UHR"
      title:         "Vier Stationen am Festtag"
      items:
        - {counter: "01 / 04", title: "Eröffnung",  description: "Lieder vom Kinderchor, kurze Reden."}
        - {counter: "02 / 04", title: "Stationen",  description: "Spiele, Bastel-Atelier, Kuchenstand."}
        - {counter: "03 / 04", title: "Bühne",      description: "Theaterstück Klasse 4."}
        - {counter: "04 / 04", title: "Ausklang",   description: "Lagerfeuer, gemeinsames Aufräumen."}
        - {counter: "", title: "", description: ""}
        - {counter: "", title: "", description: ""}
        - {counter: "", title: "", description: ""}
        - {counter: "", title: "", description: ""}
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 4 / 14"

  # 05 — three Bereiche
  - layout: layouts/three-column.slide.dsl
    content:
      pgmeta:        "Bereiche"
      eyebrow:       "DREI BEREICHE"
      title:         "Hof, Bühne, Garten."
      columns:
        - {counter: "01", heading: "Schulhof",   body: "Spiele, Bastel-Atelier, Kuchenstand."}
        - {counter: "02", heading: "Turnhalle",  body: "Bühne für Theater und Musikdarbietungen."}
        - {counter: "03", heading: "Garten",     body: "Pflanzen, Picknick, Insektenhotels."}
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 5 / 14"

  # 06 — text + picture
  - layout: layouts/text-picture.slide.dsl
    content:
      pgmeta:        "Konzept"
      eyebrow:       "KONZEPT"
      title:         "Mitmachen,\nnicht zuschauen."
      body:          "Jede Familie kann eine Aktivität betreuen oder einen Beitrag mitbringen — Kuchen, Basteltisch, Musikbeitrag."
      image:         ""
      buttons:
        - {label: "Mitmachen", style: "primary"}
        - {label: "Liste",     style: "ghost"}
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 6 / 14"

  # 07 — quote
  - layout: layouts/quote.slide.dsl
    content:
      pgmeta:        "Stimme"
      quote:         "“Schule ist kein Ort, an dem etwas mit den Kindern gemacht wird — sondern einer, an dem sie etwas machen.”"
      attribution:   "Andrea Maierhofer · Schulleitung"
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 7 / 14"

  # 08–13 — gs-ramspau brand-specific layouts via fixtures
  - layout: brands/gs-ramspau/layouts/stundenplan.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/stundenplan.yaml
  - layout: brands/gs-ramspau/layouts/termine.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/termine.yaml
  - layout: brands/gs-ramspau/layouts/team.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/team.yaml
  - layout: brands/gs-ramspau/layouts/leitbild.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/leitbild.yaml
  - layout: brands/gs-ramspau/layouts/statistik.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/statistik.yaml
  - layout: brands/gs-ramspau/layouts/checkliste.slide.dsl
    content_file: brands/gs-ramspau/examples/v2/checkliste.yaml

  # 14 — end
  - layout: layouts/end.slide.dsl
    content:
      pgmeta:        "End"
      title:         "Vielen Dank."
      footnote:      "Grundschule Ramspau · Schulfest 2026"
      footer_left:   "FLEXIBLE GRUNDSCHULE RAMSPAU"
      footer_right:  "SEITE 14 / 14"
