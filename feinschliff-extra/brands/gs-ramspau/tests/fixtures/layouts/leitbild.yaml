pgmeta: "Leitbild"
title: "Was uns trägt."
values:
  - num: "01"
    title: "Respekt"
    body: "Wir gehen freundlich und aufmerksam miteinander um — Kinder, Eltern und Kolleginnen."
  - num: "02"
    title: "Verantwortung"
    body: "Jedes Kind übernimmt Schritt für Schritt mehr Verantwortung für sein Lernen und sein Tun."
  - num: "03"
    title: "Gemeinschaft"
    body: "Wir lernen, feiern und arbeiten zusammen. Unterschiede machen uns reicher."
  - num: "04"
    title: "Freude am Lernen"
    body: "Neugier ist unser Motor. Wir feiern den Moment, in dem ein Kind etwas Neues kann."
