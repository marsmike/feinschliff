pgmeta: "Architecture"
tracker: "Request lifecycle across the platform"
action_title: "Twelve hops from edge to durable storage."
diagram_dsl: |
  zone z_edge   100,40    3340x800  "Edge / Ingress"   fill:surface
  zone z_core   3500,40   3260x800  "Core services"    fill:surface-2
  zone z_data   100,920   6660x1280 "Data plane"       fill:surface-2
  zone z_trust  100,2280  6660x560  "Trust & policy"   fill:surface

  # === Top row: edge ingress + core services. Each box 880x420 with
  # ~220px gaps so the same-row arrows are visibly long, not stubs. ===
  box client    280,200   880x420  "Client\n(web + mobile)"      fill:primary
  box waf       1380,200  880x420  "WAF\n+ rate-limit"           fill:tertiary
  box edge_lb   2480,200  880x420  "Edge LB\n(L7 TLS)"           fill:secondary
  box gateway   3680,200  880x420  "API gateway\n(auth + JWT)"   fill:primary
  box mesh      4780,200  880x420  "Service mesh\n(mTLS)"        fill:secondary
  box ordersvc  5880,200  780x420  "Order service\n(saga coord)" fill:primary

  # === Data plane: vertical convergence into bus, fan-out to notify
  # (above) and dbprim → dbread (below). 4 columns × 2 rows so every
  # arrow has 600-1100px of horizontal runway. ===
  # Col 1 (x=300..1180) — convergence sources, stacked
  box paysvc    300,1080  880x320  "Payment\nservice"         fill:primary
  box invsvc    300,1700  880x320  "Inventory\nservice"       fill:primary

  # Col 2 (x=2000..2880) — hub, vertically centred between paysvc & invsvc
  box bus       2000,1390 880x320  "Event bus\n(durable)"     fill:secondary

  # Col 3 (x=3700..4580) — fan-out targets, stacked
  box notify    3700,1080 880x320  "Notification\nfan-out"    fill:secondary
  box dbprim    3700,1700 880x320  "Primary DB\n(write)"      fill:ink

  # Col 4 (x=5400..6280) — replication target, same row as dbprim
  box dbread    5400,1700 880x320  "Read\nreplica"            fill:ink

  # Decorative: advisory fraud-scoring side-channel, no arrow.
  box fraud     5400,1080 880x320  "Fraud scoring\n(advisory)" fill:tertiary

  # === Trust & policy — decorative band, no arrows. Implicit context
  # for everything above; wiring it in produces the "arrow hell" the
  # previous fixture cautioned against. ===
  box kms       300,2360   880x400 "KMS\n(envelope keys)"      fill:warning
  box vault     1280,2360  880x400 "Secrets vault\n(rotation)" fill:warning
  box iam       2260,2360  880x400 "Identity provider\n(OIDC)" fill:tertiary
  box policy    3240,2360  880x400 "Policy engine\n(OPA)"      fill:tertiary
  box audit     4220,2360  880x400 "Audit log\n(append-only)"  fill:secondary
  box pii       5200,2360  880x400 "PII tokenizer"             fill:warning
  box dlq       6180,2360  500x400 "DLQ"                       fill:danger

  # === Twelve hops, every arrow port-anchored and labelled. ===

  # Top sequence (5 hops, all clean horizontal L→R)
  arrow client:right    -> waf:left      label:"HTTPS"
  arrow waf:right       -> edge_lb:left  label:"rate-ok"
  arrow edge_lb:right   -> gateway:left  label:"TLS term"
  arrow gateway:right   -> mesh:left     label:"JWT ok"
  arrow mesh:right      -> ordersvc:left label:"mTLS"

  # Cross-zone saga dispatch: ordersvc (core, far right) routes via
  # the top edge of the data plane down into paysvc. Manual via:
  # waypoints keep the polyline rectilinear and the arrowhead pointing
  # cleanly DOWN into paysvc:top.
  arrow ordersvc:bottom -> paysvc:top via:6270,1000;740,1000 label:"charge"

  # Saga next step inside the data plane — paysvc triggers invsvc
  # reserve. Vertical adjacency, straight 280px line.
  arrow paysvc:bottom   -> invsvc:top   label:"reserve"

  # Convergence into bus + fan-out from bus — bare (no port, no elbow)
  # within the same zone. The four diagonals form an X around bus that
  # visually IS the convergence/fan-out pattern. Port-anchored elbows
  # were tried first but produced overlapping label positions because
  # the two fan-out arrows shared their horizontal segment.
  arrow paysvc           -> bus           label:"paid"
  arrow invsvc           -> bus           label:"held"
  arrow bus              -> notify        label:"notify"
  arrow bus              -> dbprim        label:"persist"

  # Storage replication — straight horizontal, no routing needed.
  arrow dbprim:right    -> dbread:left   label:"replicate"
so_what: "P95 budget = 80 ms; 32 ms is the policy round-trip — cache decisions per request, refresh out-of-band"
footer_left: "Feinschliff"
footer_right: "v0.3"
