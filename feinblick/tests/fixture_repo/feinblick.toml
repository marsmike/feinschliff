# feinblick config for the integration fixture_repo.
#
# Points the code/skill roots at the fixture's own dirs and drives the skill
# progressive-disclosure budget low enough that skills/bad/SKILL.md trips it.
# Engines are listed for realism, but the integration test STUBS the engine
# registry, so no uvx/npx ever runs in CI.

[code]
roots = ["src"]
test_globs = ["**/tests/**"]
engines = ["cytoscnpy", "tach"]

# No skills engine: agnix needs Node, which CI doesn't have. feinblick's
# NATIVE skill rules (PD budget / frontmatter / description) carry skill
# validation here, exactly as they do on a no-Node machine.
[skills]
roots = ["skills"]
engines = []
skill_md_max_lines = 10
